      margin: -1px;

/** Keeps roadmap copy safe if strings ever include `<` or `&`. */
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function renderDomainCourseBlock(domainKey) {
  const c = DOMAIN_UDEMY_COURSES[domainKey];
  if (!c) return '';
  const label = DOMAINS[domainKey].label;
  const headingId = `domain-course-${domainKey}`;
  return `
  <section class="course-section tab-course" aria-labelledby="${headingId}">
    <h2 id="${headingId}" class="course-section__title">Recommended Udemy course · ${escapeHtml(label)}</h2>
    <p class="course-lead">${escapeHtml(c.lead)}</p>
    <article class="course-card">
      <h3 class="course-card__name">${escapeHtml(c.title)}</h3>
      <p class="course-meta">${escapeHtml(c.meta)}</p>
      <p>${escapeHtml(c.body)}</p>
      <ul class="course-benefits">
        ${c.benefits.map((b) => `<li>${escapeHtml(b)}</li>`).join('')}
      </ul>
      <a class="course-cta" href="${c.url}" rel="noopener noreferrer" target="_blank">View course on Udemy</a>
    </article>
  </section>`;
}

function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = Object.entries(DOMAINS)
    .map(
      ([key, d]) => `
    <button
      type="button"
      class="tab-btn"
      role="tab"
      id="tab-${key}"
      data-domain="${key}"
      aria-selected="${key === currentDomain}"
      aria-controls="content"
      tabindex="${key === currentDomain ? '0' : '-1'}"
    >${escapeHtml(d.label)}</button>`
    )
    .join('');
}

function switchDomain(key) {
  if (!DOMAINS[key]) return;
  currentDomain = key;
  renderTabs();
  renderContent();
}

      <div class="week-body" id="body-${wk.w}" role="region" aria-labelledby="toggle-${wk.w}" hidden>
        <div class="section-head">Topics</div>
        <ul class="bullet-list">${wk.topics.map((t) => `<li>${escapeHtml(t)}</li>`).join('')}</ul>
        <div class="section-head">Practical tasks</div>
        <ul class="bullet-list">${wk.tasks.map((t) => `<li>${escapeHtml(t)}</li>`).join('')}</ul>
        <div class="section-head">Resources</div>
        <div>${wk.resources.map((r) => `<span class="resource-chip">${escapeHtml(r)}</span>`).join('')}</div>
        ${
          wk.project
            ? `<div class="project-banner" style="background:${d.bg};color:${d.color};border-color:${d.color}40"><span aria-hidden="true">🏗 </span>${escapeHtml(wk.project)}</div>`
            : ''
        }
      </div>
    </div>`;
  });

  html += `<div class="outcome-box">
    <h2>Final outcome</h2>
    <p>${escapeHtml(d.outcome)}</p>
  </div>`;

  html += `<div class="mistakes-box">
    <h2>Common mistakes to avoid</h2>
    <ul class="bullet-list">${d.mistakes.map((m) => `<li>${escapeHtml(m)}</li>`).join('')}</ul>
  </div>`;

  const panel = document.getElementById('content');
  panel.innerHTML = html;
  panel.setAttribute('aria-labelledby', `tab-${currentDomain}`);
}

function toggleWeek(n) {
  const body = document.getElementById(`body-${n}`);
  const chev = document.getElementById(`chev-${n}`);
  const toggle = document.querySelector(`.week-toggle[data-week="${n}"]`);
  if (!body || !toggle) return;

  const isOpen = body.classList.contains('is-open');
  const next = !isOpen;
  body.classList.toggle('is-open', next);
  if (chev) chev.classList.toggle('is-open', next);
  toggle.setAttribute('aria-expanded', String(next));
  body.hidden = !next;
}

function initRoadmapUi() {
  const tabsEl = document.getElementById('tabs');
  const contentEl = document.getElementById('content');

  tabsEl.addEventListener('click', (e) => {
    const btn = e.target.closest('.tab-btn');
    if (!btn || !tabsEl.contains(btn)) return;
    const { domain } = btn.dataset;
    if (domain) switchDomain(domain);
  });

  tabsEl.addEventListener('keydown', (e) => {
    const keys = Object.keys(DOMAINS);
    const idx = keys.indexOf(currentDomain);
    if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
      e.preventDefault();
      const dir = e.key === 'ArrowRight' ? 1 : -1;
      const next = keys[(idx + dir + keys.length) % keys.length];
      switchDomain(next);
      document.getElementById(`tab-${next}`)?.focus();
    }
  });

  contentEl.addEventListener('click', (e) => {
    const toggle = e.target.closest('.week-toggle');
    if (!toggle || !contentEl.contains(toggle)) return;
    const n = Number(toggle.dataset.week, 10);
    if (!Number.isNaN(n)) toggleWeek(n);
  });
}

renderTabs();
renderContent();
initRoadmapUi();
</script>
</body>
</html>
